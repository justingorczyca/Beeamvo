name: beeamvo
description: "Beeamvo - Voice-to-text transcription app with global hotkey support"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Flutter's built-in localizations delegates (Material/Cupertino/Widgets).
  # Makes the app locale-aware at the framework level; app-string extraction
  # to .arb is a tracked follow-up (audit H12).
  flutter_localizations:
    sdk: flutter

  http: ^1.2.2
  hotkey_manager: ^0.2.3
  record: ^7.0.0
  super_clipboard: ^0.9.1
  path_provider: ^2.1.4
  path: ^1.9.0
  window_manager: ^0.5.1
  screen_retriever: ^0.2.0
  tray_manager: ^0.5.2
  win32: ^5.15.0
  ffi: ^2.1.4
  launch_at_startup: ^0.5.1
  package_info_plus: ^9.0.0
  google_fonts: ^8.0.0
  googleapis_auth: ^2.0.0
  flutter_secure_storage: ^10.3.1
  flutter_dotenv: ^6.0.0
  crypto: ^3.0.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
